<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL Node Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --surface: #13171f;
    --border: #1e2530;
    --accent: #4fffb0;
    --accent2: #4f9fff;
    --danger: #ff5f5f;
    --text: #e4eaf4;
    --muted: #6b7a96;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(79,255,176,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  /* header */
  header { margin-bottom: 2.5rem; }
  .chip {
    display: inline-block;
    background: rgba(79,255,176,.1);
    border: 1px solid rgba(79,255,176,.25);
    color: var(--accent);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .25rem .65rem;
    border-radius: 2px;
    letter-spacing: .08em;
    margin-bottom: .75rem;
  }
  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -.02em;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: .875rem;
    margin-top: .4rem;
    font-weight: 300;
  }

  /* card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card-label {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: .75rem;
  }

  /* textarea */
  textarea {
    width: 100%;
    min-height: 130px;
    background: #0d1017;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    padding: .9rem 1rem;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: rgba(79,255,176,.4); }
  textarea::placeholder { color: #3a4459; }

  .hint {
    color: var(--muted);
    font-family: var(--mono);
    font-size: .72rem;
    margin-top: .5rem;
  }
  .hint code { color: var(--accent2); }

  /* button */
  .btn-row { display: flex; gap: .75rem; margin-top: 1.1rem; align-items: center; }
  button {
    font-family: var(--sans);
    font-weight: 600;
    font-size: .875rem;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    padding: .65rem 1.4rem;
    transition: all .15s;
  }
  #submitBtn {
    background: var(--accent);
    color: #0b0e14;
    letter-spacing: .01em;
  }
  #submitBtn:hover { background: #6effc1; }
  #submitBtn:active { transform: scale(.97); }
  #submitBtn:disabled { opacity: .45; cursor: not-allowed; }
  #clearBtn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  #clearBtn:hover { color: var(--text); border-color: #2e3a50; }

  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(79,255,176,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* error */
  #errBox {
    display: none;
    background: rgba(255,95,95,.08);
    border: 1px solid rgba(255,95,95,.3);
    border-radius: 6px;
    padding: .85rem 1.1rem;
    color: var(--danger);
    font-family: var(--mono);
    font-size: .8rem;
    margin-bottom: 1.25rem;
  }

  /* result section */
  #result { display: none; }

  /* summary strip */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.1rem;
  }
  .stat-num {
    font-family: var(--mono);
    font-size: 1.7rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: .72rem;
    color: var(--muted);
    margin-top: .3rem;
    text-transform: uppercase;
    letter-spacing: .07em;
  }

  /* identity row */
  .id-row {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .id-pill {
    font-family: var(--mono);
    font-size: .72rem;
    padding: .3rem .7rem;
    border-radius: 3px;
    background: rgba(79,159,255,.07);
    border: 1px solid rgba(79,159,255,.2);
    color: var(--accent2);
  }

  /* hierarchies */
  .hier-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .hier-card {
    background: #0d1017;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 1.1rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp .3s ease both;
  }
  .hier-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .hier-card.cycle::before { background: var(--danger); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hier-root {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: .5rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .hier-root.cycle-root { color: var(--danger); }
  .badge {
    font-size: .62rem;
    padding: .15rem .45rem;
    border-radius: 2px;
    letter-spacing: .05em;
  }
  .badge-cycle { background: rgba(255,95,95,.15); color: var(--danger); }
  .badge-tree  { background: rgba(79,255,176,.1);  color: var(--accent);  }
  .depth-info {
    font-size: .72rem;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: .7rem;
  }
  .tree-vis {
    font-family: var(--mono);
    font-size: .75rem;
    color: #8fa4c8;
    white-space: pre;
    line-height: 1.55;
    background: #080b10;
    border-radius: 4px;
    padding: .6rem .75rem;
    overflow-x: auto;
    max-height: 180px;
  }

  /* tags (invalid / dup) */
  .tag-list { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .6rem; }
  .tag {
    font-family: var(--mono);
    font-size: .72rem;
    padding: .2rem .55rem;
    border-radius: 3px;
  }
  .tag-invalid { background: rgba(255,95,95,.1);   color: #ff9090; border: 1px solid rgba(255,95,95,.2); }
  .tag-dup     { background: rgba(255,180,60,.08); color: #ffb93c; border: 1px solid rgba(255,180,60,.2); }
  .empty-note  { font-family: var(--mono); font-size: .75rem; color: #3a4459; }

  /* raw toggle */
  .raw-toggle {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .3rem .7rem;
    margin-top: .75rem;
    transition: color .15s;
  }
  .raw-toggle:hover { color: var(--text); }
  .raw-block {
    display: none;
    background: #080b10;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    font-family: var(--mono);
    font-size: .73rem;
    color: #6b7a96;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
    margin-top: .5rem;
  }

  @media (max-width: 500px) {
    .summary-strip { grid-template-columns: 1fr 1fr; }
    .stat:last-child { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="chip">POST /bfhl</div>
    <h1>Node <span>Hierarchy</span> Analyzer</h1>
    <p class="subtitle">Parse directed edges · Detect cycles · Build trees</p>
  </header>

  <div class="card">
    <div class="card-label">Input Edges</div>
    <textarea id="edgeInput" placeholder='Enter edges separated by commas or newlines&#10;e.g.  A->B, A->C, B->D, X->Y, Y->Z, Z->X'></textarea>
    <p class="hint">Format: <code>X->Y</code> &nbsp;·&nbsp; X and Y must be single uppercase letters A–Z</p>
    <div class="btn-row">
      <button id="submitBtn" onclick="runAnalysis()">Analyze →</button>
      <button id="clearBtn" onclick="clearAll()">Clear</button>
      <div class="spinner" id="spin"></div>
    </div>
  </div>

  <div id="errBox"></div>
  <div id="result"></div>

</div>

<script>

const API_BASE = window.location.hostname === "localhost"
  ? "http://localhost:3001"
  : "https://bajaj-fullstack-znjb.onrender.com"; 


function treeToLines(obj, prefix = "", isLast = true) {
  const keys = Object.keys(obj);
  let lines = [];
  keys.forEach((k, i) => {
    const last = i === keys.length - 1;
    lines.push(prefix + (isLast && prefix === "" ? "" : "") + (last ? "└─ " : "├─ ") + k);
    const childLines = treeToLines(obj[k], prefix + (last ? "   " : "│  "), last);
    lines = lines.concat(childLines);
  });
  return lines;
}

function renderTree(root, treeObj) {
  const inner = treeObj[root];
  if (!inner || Object.keys(inner).length === 0) return root + "\n  (leaf)";
  const childLines = treeToLines(inner, "   ", true);
  return root + "\n" + childLines.join("\n");
}

// ── main ─────────────────────────────────────────────────────────────────────
async function runAnalysis() {
  const raw = document.getElementById("edgeInput").value.trim();
  if (!raw) { showErr("Please enter at least one edge."); return; }

  // parse input: split by comma or newline
  const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

  setLoading(true);
  hideErr();
  document.getElementById("result").style.display = "none";

  try {
    const resp = await fetch(`${API_BASE}/bfhl`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const json = await resp.json();
    renderResult(json);
  } catch (e) {
    showErr("API call failed — " + e.message + ". Check your connection or ensure the server is running.");
  } finally {
    setLoading(false);
  }
}

function renderResult(r) {
  const el = document.getElementById("result");
  el.style.display = "block";

  // summary stats
  const sumHtml = `
    <div class="summary-strip">
      <div class="stat"><div class="stat-num">${r.summary.total_trees}</div><div class="stat-label">Trees</div></div>
      <div class="stat"><div class="stat-num">${r.summary.total_cycles}</div><div class="stat-label">Cycles</div></div>
      <div class="stat"><div class="stat-num">${r.summary.largest_tree_root || "—"}</div><div class="stat-label">Largest Root</div></div>
    </div>`;

  // identity
  const idHtml = `
    <div class="id-row">
      <div class="id-pill">${r.user_id}</div>
      <div class="id-pill">${r.email_id}</div>
      <div class="id-pill">${r.college_roll_number}</div>
    </div>`;

  // hierarchies
  const hierCards = r.hierarchies.map((h, i) => {
    const isCyc = !!h.has_cycle;
    const badge = isCyc
      ? `<span class="badge badge-cycle">CYCLE</span>`
      : `<span class="badge badge-tree">TREE · depth ${h.depth}</span>`;
    const treeContent = isCyc
      ? `<div class="tree-vis" style="color:#ff6b6b">⚠ Cyclic — no tree structure</div>`
      : `<div class="tree-vis">${renderTree(h.root, h.tree)}</div>`;
    return `
      <div class="hier-card ${isCyc ? "cycle" : ""}" style="animation-delay:${i * 0.05}s">
        <div class="hier-root ${isCyc ? "cycle-root" : ""}">${h.root} ${badge}</div>
        ${treeContent}
      </div>`;
  }).join("");

  // invalid
  const invHtml = r.invalid_entries.length
    ? r.invalid_entries.map(e => `<span class="tag tag-invalid">${e || '""'}</span>`).join("")
    : `<span class="empty-note">none</span>`;

  // duplicates
  const dupHtml = r.duplicate_edges.length
    ? r.duplicate_edges.map(e => `<span class="tag tag-dup">${e}</span>`).join("")
    : `<span class="empty-note">none</span>`;

  const rawJson = JSON.stringify(r, null, 2);

  el.innerHTML = `
    ${sumHtml}
    ${idHtml}
    <div class="card">
      <div class="card-label">Hierarchies (${r.hierarchies.length})</div>
      <div class="hier-grid">${hierCards || '<span class="empty-note">No hierarchies found</span>'}</div>
    </div>
    <div class="card">
      <div class="card-label">Invalid Entries</div>
      <div class="tag-list">${invHtml}</div>
    </div>
    <div class="card">
      <div class="card-label">Duplicate Edges</div>
      <div class="tag-list">${dupHtml}</div>
    </div>
    <button class="raw-toggle" onclick="toggleRaw(this)">Show Raw JSON</button>
    <div class="raw-block">${escHtml(rawJson)}</div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function toggleRaw(btn) {
  const block = btn.nextElementSibling;
  const open = block.style.display === "block";
  block.style.display = open ? "none" : "block";
  btn.textContent = open ? "Show Raw JSON" : "Hide Raw JSON";
}

function showErr(msg) {
  const el = document.getElementById("errBox");
  el.textContent = "✕  " + msg;
  el.style.display = "block";
}
function hideErr() { document.getElementById("errBox").style.display = "none"; }
function setLoading(on) {
  document.getElementById("submitBtn").disabled = on;
  document.getElementById("spin").style.display = on ? "block" : "none";
  document.getElementById("submitBtn").textContent = on ? "Analyzing…" : "Analyze →";
}
function clearAll() {
  document.getElementById("edgeInput").value = "";
  document.getElementById("result").style.display = "none";
  hideErr();
}

// allow Enter key shortcut (Ctrl+Enter)
document.getElementById("edgeInput").addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "Enter") runAnalysis();
});
</script>
</body>
</html>
