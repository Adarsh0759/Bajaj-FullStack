<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL Node Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --surface: #13171f;
    --border: #1e2530;
    --accent: #4fffb0;
    --accent2: #4f9fff;
    --danger: #ff5f5f;
    --text: #e4eaf4;
    --muted: #6b7a96;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(79,255,176,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 2.5rem; }

  .chip {
    display: inline-block;
    background: rgba(79,255,176,.1);
    border: 1px solid rgba(79,255,176,.25);
    color: var(--accent);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .25rem .65rem;
    border-radius: 2px;
    letter-spacing: .08em;
    margin-bottom: .75rem;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: .875rem;
    margin-top: .4rem;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: .75rem;
  }

  textarea {
    width: 100%;
    min-height: 130px;
    background: #0d1017;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    padding: .9rem 1rem;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }

  .btn-row {
    display: flex;
    gap: .75rem;
    margin-top: 1.1rem;
    align-items: center;
  }

  button {
    font-family: var(--sans);
    font-weight: 600;
    font-size: .875rem;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    padding: .65rem 1.4rem;
  }

  #submitBtn {
    background: var(--accent);
    color: #0b0e14;
  }

  #clearBtn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(79,255,176,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #errBox {
    display: none;
    background: rgba(255,95,95,.08);
    border: 1px solid rgba(255,95,95,.3);
    border-radius: 6px;
    padding: .85rem 1.1rem;
    color: var(--danger);
    font-family: var(--mono);
    font-size: .8rem;
    margin-bottom: 1.25rem;
  }

  #result { display: none; }
</style>
</head>
<body>

<div class="wrap">

<header>
  <div class="chip">POST /bfhl</div>
  <h1>Node <span>Hierarchy</span> Analyzer</h1>
  <p class="subtitle">Parse directed edges · Detect cycles · Build trees</p>
</header>

<div class="card">
  <div class="card-label">Input Edges</div>
  <textarea id="edgeInput" placeholder="A->B, A->C, B->D"></textarea>

  <div class="btn-row">
    <button id="submitBtn" onclick="runAnalysis()">Analyze →</button>
    <button id="clearBtn" onclick="clearAll()">Clear</button>
    <div class="spinner" id="spin"></div>
  </div>
</div>

<div id="errBox"></div>
<div id="result"></div>

</div>

<script>

const API_BASE = window.location.hostname === "localhost"
  ? "http://localhost:3001"
  : "";

function treeToLines(obj, prefix = "") {
  const keys = Object.keys(obj);
  let lines = [];

  keys.forEach((k, i) => {
    const last = i === keys.length - 1;
    lines.push(prefix + (last ? "└─ " : "├─ ") + k);
    lines = lines.concat(treeToLines(obj[k], prefix + (last ? "   " : "│  ")));
  });

  return lines;
}

function renderTree(root, treeObj) {
  const inner = treeObj[root];
  if (!inner || Object.keys(inner).length === 0) return root + "\n  (leaf)";
  return root + "\n" + treeToLines(inner, "   ").join("\n");
}

async function runAnalysis() {
  const raw = document.getElementById("edgeInput").value.trim();
  if (!raw) {
    showErr("Please enter at least one edge.");
    return;
  }

  const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

  setLoading(true);
  hideErr();
  document.getElementById("result").style.display = "none";

  try {
    const resp = await fetch(`${API_BASE}/bfhl`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const json = await resp.json();

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
      `<pre>${JSON.stringify(json, null, 2)}</pre>`;

  } catch (e) {
    showErr("API call failed — " + e.message);
  } finally {
    setLoading(false);
  }
}

function showErr(msg) {
  const el = document.getElementById("errBox");
  el.textContent = msg;
  el.style.display = "block";
}

function hideErr() {
  document.getElementById("errBox").style.display = "none";
}

function setLoading(on) {
  document.getElementById("submitBtn").disabled = on;
  document.getElementById("spin").style.display = on ? "block" : "none";
}

function clearAll() {
  document.getElementById("edgeInput").value = "";
  document.getElementById("result").style.display = "none";
  hideErr();
}

</script>

</body>
</html>
